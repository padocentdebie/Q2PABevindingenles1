<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTV Dashboard - Zaandam 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, serverTimestamp, collection, addDoc, query, where, orderBy, setDoc, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            authDomain: "pvaangifteinleveren-77dbe.firebaseapp.com",
            projectId: "pvaangifteinleveren-77dbe",
            storageBucket: "pvaangifteinleveren-77dbe.firebasestorage.app",
            messagingSenderId: "20239054410",
            appId: "1:20239054410:web:264b3c759312248d9f18b3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const LES_ID = "btv_2026_zaandam";

        window.startLes = () => {
            const naam = document.getElementById('uNaam').value.trim();
            const klas = document.getElementById('uKlas').value;
            if(!naam || !klas) return alert("Vul voornaam en eenheid in.");
            document.getElementById('loginOverlay').style.display='none';
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayKlas').innerText = klas;
            initLive(klas, naam);
        };

        async function initLive(klas, naam) {
            setupSharedWhiteboard('c1', LES_ID + '_bord1_' + klas, db);
            setupSharedWhiteboard('c2', LES_ID + '_bord2_' + klas, db);
            setupLiveText('daaInput', LES_ID + '_daa_' + klas, db);
            setupLiveText('pvInput', LES_ID + '_pv_' + klas, db);
            
            // LIVE FEED ONDERAAN
            const q = query(collection(db, "btv_submissions"), where("klas", "==", klas), orderBy("ts", "desc"));
            onSnapshot(q, (sn) => {
                const feed = document.getElementById('liveFeed');
                feed.innerHTML = "";
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 md:grid-cols-2 gap-4 w-full";
                
                sn.forEach(d => {
                    const data = d.data();
                    const tags = data.feedback ? data.feedback.split(', ') : [];
                    const card = `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                            <div class="bg-slate-100 px-4 py-2 border-b border-slate-200 flex justify-between items-center">
                                <span class="font-black text-blue-900 text-[11px] uppercase tracking-tighter">${data.naam}</span>
                                <span class="bg-blue-900 text-white text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">${data.type}</span>
                            </div>
                            <div class="p-4 flex-grow"><p class="text-slate-700 text-sm italic">"${data.txt}"</p></div>
                            ${data.feedback ? `<div class="p-3 bg-blue-50/50 border-t border-blue-100 flex flex-wrap gap-1">
                                ${tags.map(t => `<span class="bg-white border border-blue-200 text-blue-700 text-[9px] px-2 py-1 rounded font-bold">✓ ${t}</span>`).join('')}
                            </div>` : ''}
                        </div>`;
                    grid.innerHTML += card;
                });
                feed.appendChild(grid);
            });
        }

        function setupLiveText(elementId, docId, db) {
            const el = document.getElementById(elementId);
            const docRef = doc(db, "live_texts", docId);
            let ignoreUpdate = false;

            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists() && document.activeElement !== el) {
                    el.value = docSnap.data().content || "";
                }
            });

            el.addEventListener('input', async () => {
                await setDoc(docRef, { content: el.value, ts: serverTimestamp() }, { merge: true });
            });
        }

        async function setupSharedWhiteboard(canvasId, docId, db) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = 180;
            let drawing = false; let currentPath = [];
            window[`mode_${canvasId}`] = 'draw'; 
            const docRef = doc(db, "whiteboards", docId);

            onSnapshot(docRef, (docSnap) => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (docSnap.exists()) {
                    (docSnap.data().elements || []).forEach(el => {
                        if (el.type === 'path') {
                            ctx.beginPath(); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#002d5e';
                            el.points.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
                            ctx.stroke();
                        } else if (el.type === 'text') {
                            ctx.font = "bold 14px Arial"; ctx.fillStyle = "#002d5e"; ctx.fillText(el.content, el.x, el.y);
                        }
                    });
                }
            });

            const getP = (e) => {
                const r = canvas.getBoundingClientRect();
                const cX = e.touches ? e.touches[0].clientX : e.clientX;
                const cY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: cX - r.left, y: cY - r.top };
            };

            canvas.onmousedown = (e) => {
                const p = getP(e);
                if (window[`mode_${canvasId}`] === 'text') {
                    const txt = prompt("Tekst:");
                    if (txt) updateDoc(docRef, { elements: arrayUnion({ type: 'text', content: txt, x: p.x, y: p.y }) }).catch(() => setDoc(docRef, { elements: [{ type: 'text', content: txt, x: p.x, y: p.y }] }));
                } else { drawing = true; ctx.beginPath(); ctx.moveTo(p.x, p.y); currentPath = [p]; }
            };

            canvas.onmousemove = (e) => {
                if (!drawing) return;
                const p = getP(e); currentPath.push(p);
                ctx.lineWidth = 3; ctx.strokeStyle = '#002d5e'; ctx.lineTo(p.x, p.y); ctx.stroke();
            };

            const stopDrawing = async () => {
                if (!drawing) return; drawing = false;
                await updateDoc(docRef, { elements: arrayUnion({ type: 'path', points: currentPath }) }).catch(() => setDoc(docRef, { elements: [{ type: 'path', points: currentPath }] }));
            };

            window.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.onmousedown(e); }, {passive:false});
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); canvas.onmousemove(e); }, {passive:false});
            canvas.addEventListener('touchend', stopDrawing);

            window['clear_' + canvasId] = async () => { if(confirm("Bord leegmaken?")) await setDoc(docRef, { elements: [] }); };
            window['setMode_' + canvasId] = (m) => { window[`mode_${canvasId}`] = m; canvas.style.cursor = (m === 'text') ? 'text' : 'crosshair'; };
        }

        window.sendData = async (type, elementId) => {
            const txt = document.getElementById(elementId).value;
            const naam = document.getElementById('uNaam').value;
            const klas = document.getElementById('uKlas').value;
            if(!txt) return alert("Veld is leeg.");
            const gekozen = Array.from(document.querySelectorAll('#feedbackChecklist input:checked')).map(c => c.value);
            
            try {
                await addDoc(collection(db, "btv_submissions"), { 
                    naam, klas, type, txt, ts: serverTimestamp(), feedback: gekozen.join(", ") 
                });
                alert("Succesvol verzonden naar de Live Feed!");
            } catch (e) { alert("Fout bij verzenden: " + e.message); }
        };

        window.resetAlles = async () => {
            if(confirm("Alles wissen voor deze eenheid?")) {
                const klas = document.getElementById('uKlas').value;
                document.querySelectorAll('textarea').forEach(t => t.value = "");
                document.getElementById('liveScore').innerText = "0";
                document.querySelectorAll('#feedbackChecklist input').forEach(c => c.checked = false);
                await deleteDoc(doc(db, "live_texts", LES_ID + '_daa_' + klas));
                await deleteDoc(doc(db, "live_texts", LES_ID + '_pv_' + klas));
            }
        };
    </script>

    <script>
        const criteria = [
            ["ik legde", "zijligging"], ["ik zette", "kruising", "af"], ["ik riep", "ambulance"],
            ["ik sprak", "slachtoffer", "aan"], ["ik hield", "verkeer", "afstand"], ["ik plaatste", "motorfiets"],
            ["ik bekeek", "letsel"], ["ik verwijderde", "helm", "niet"], ["ik zette", "getuigen", "apart"],
            ["ik noteerde", "rugklachten"], ["ik controleerde", "bewustzijn"], ["ik markeerde", "vloeistoffen"],
            ["ik vroeg", "gegevens", "op"], ["ik maakte", "route", "vrij"], ["ik stelde", "pv", "op"]
        ];
        function checkZinnen() {
            const tekst = document.getElementById('zinInput').value.toLowerCase();
            let score = 0;
            criteria.forEach((woorden, index) => {
                const ind = document.getElementById(`check-${index + 1}`);
                const ok = woorden.every(w => tekst.includes(w));
                if(ind) ind.className = ok ? "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_green]" : "w-3 h-3 rounded-full bg-slate-300";
                if (ok) score++;
            });
            document.getElementById('liveScore').innerText = score;
        }
    </script>
    <style> .bg-police { background-color: #002d5e; } .shadow-police { box-shadow: 0 4px 15px rgba(0, 45, 94, 0.2); } </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-20 p-4">
    <div id="loginOverlay" class="fixed inset-0 bg-police z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded shadow-2xl w-full max-w-lg border-t-8 border-yellow-500">
            <h1 class="font-black text-2xl mb-4 text-police italic uppercase">Inloggen</h1>
            <input type="text" id="uNaam" placeholder="Jouw Voornaam" class="w-full border-2 p-4 rounded-lg mb-4 font-bold outline-none focus:border-police text-center text-lg">
            <select id="uKlas" class="w-full border-2 p-4 rounded-lg mb-8 font-bold outline-none focus:border-police text-center text-lg">
                <option value="">-- Kies Eenheid --</option>
                <option>Delta</option><option>Echo</option><option>Foxtrot</option><option>Kilo</option><option>Lima</option><option>Mike</option>
            </select>
            <button onclick="startLes()" class="w-full bg-police text-white p-5 rounded-lg font-black uppercase tracking-widest hover:bg-blue-900 transition-all">Start Dashboard</button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-4xl mx-auto space-y-10">
        <header class="flex justify-between items-center bg-police text-white p-5 rounded-2xl shadow-xl">
            <div class="font-black italic uppercase">Eenheid: <span id="displayKlas" class="text-yellow-400"></span></div>
            <button onclick="resetAlles()" class="bg-red-600 px-4 py-2 rounded-lg font-black text-[10px] uppercase">Reset Alle Velden</button>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-police border-t-4 border-police">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black uppercase text-xs text-police italic">2a: Redenen van Wetenschap</h2>
                    <div class="flex gap-1">
                        <button onclick="setMode_c1('draw')" class="bg-slate-100 p-1 rounded border text-[10px]">✏️</button>
                        <button onclick="setMode_c1('text')" class="bg-slate-100 p-1 rounded border text-[10px]">⌨️</button>
                        <button onclick="clear_c1()" class="text-[10px] text-red-600 border px-2 py-1 rounded">Gum</button>
                    </div>
                </div>
                <canvas id="c1" class="w-full bg-slate-50 border-2 rounded-xl mb-4 touch-none"></canvas>
                <textarea id="t1" class="w-full border-2 p-3 rounded-xl text-sm h-16" placeholder="Toelichting..."></textarea>
                <button onclick="sendData('Redenen Wetenschap', 't1')" class="w-full bg-police text-white py-2 mt-2 rounded-xl font-black uppercase text-[10px]">Verstuur</button>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-police border-t-4 border-police">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black uppercase text-xs text-police italic">2b: Situatieschets</h2>
                    <div class="flex gap-1">
                        <button onclick="setMode_c2('draw')" class="bg-slate-100 p-1 rounded border text-[10px]">✏️</button>
                        <button onclick="setMode_c2('text')" class="bg-slate-100 p-1 rounded border text-[10px]">⌨️</button>
                        <button onclick="clear_c2()" class="text-[10px] text-red-600 border px-2 py-1 rounded">Gum</button>
                    </div>
                </div>
                <canvas id="c2" class="w-full bg-slate-50 border-2 rounded-xl mb-4 touch-none"></canvas>
                <textarea id="t2" class="w-full border-2 p-3 rounded-xl text-sm h-16" placeholder="Toelichting..."></textarea>
                <button onclick="sendData('Situatieschets', 't2')" class="w-full bg-police text-white py-2 mt-2 rounded-xl font-black uppercase text-[10px]">Verstuur</button>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-police border-t-4 border-police">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="font-black uppercase text-sm text-police italic underline">Deel 3: Actieve Verleden Tijd</h2>
                <div class="bg-green-600 text-white px-4 py-1 rounded-full font-black text-xs">Score: <span id="liveScore">0</span>/15</div>
            </div>
            <div class="grid md:grid-cols-2 gap-6">
                <div class="space-y-2 text-[10px] font-bold bg-slate-50 p-4 rounded-xl h-60 overflow-y-auto">
                    <script>
                        const zinnen = [
                            "De motorrijder is door mij in stabiele zijligging gelegd.", "De kruising is door mij direct afgezet.", "De ambulance is door mij via het OC opgeroepen.",
                            "Het slachtoffer is door mij voorzichtig aangesproken.", "Het verkeer is door mij op afstand gehouden.", "De motorfiets is door mij op de stoep geplaatst.",
                            "Het letsel is door mij nauwkeurig bekeken.", "De helm is door mij niet verwijderd.", "De getuigen zijn door mij apart gezet.",
                            "De rugklachten zijn door mij genoteerd.", "Het bewustzijn is door mij gecontroleerd.", "De vloeistoffen op de weg zijn door mij gemarkeerd.",
                            "De persoonsgegevens zijn door mij opgevraagd.", "De route is door mij vrijgemaakt.", "Het PV is door mij direct opgesteld."
                        ];
                        zinnen.forEach((z, i) => document.write(`
                            <div class="flex items-center gap-3 bg-white p-2 rounded border border-slate-200">
                                <span id="check-${i+1}" class="w-2 h-2 rounded-full bg-slate-300 shrink-0"></span>
                                <span>${i+1}. ${z}</span>
                            </div>`));
                    </script>
                </div>
                <textarea id="zinInput" oninput="checkZinnen()" class="w-full border-2 p-4 rounded-xl text-sm h-60 outline-none focus:border-police" placeholder="Schrijf hier de actieve ik-zinnen..."></textarea>
            </div>
        </section>

        <section class="bg-yellow-50 border-4 border-yellow-400 p-6 rounded-2xl shadow-lg">
            <h2 class="font-black uppercase text-sm mb-4 text-yellow-900 italic text-center underline">Deel 5: Stel uw DAA op (Live Sync)</h2>
            <textarea id="daaInput" class="w-full border-2 border-yellow-200 p-5 rounded-xl text-sm h-40 shadow-inner" placeholder="Doel - Aanpak - Analyse..."></textarea>
            <button onclick="sendData('DAA', 'daaInput')" class="w-full bg-yellow-600 text-white py-4 mt-4 rounded-xl font-black uppercase text-xs shadow-md">Verstuur DAA naar Live Feed</button>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-police border-t-4 border-police">
            <h2 class="font-black uppercase text-sm mb-4 text-police italic underline">Deel 7: PV Bevindingen (Live Sync)</h2>
            <textarea id="pvInput" class="w-full border-2 p-5 rounded-xl text-sm h-60" placeholder="Stel hier je PV op..."></textarea>
            <button onclick="sendData('PV Bevindingen', 'pvInput')" class="w-full bg-police text-white py-4 mt-4 rounded-xl font-black uppercase text-xs shadow-md italic">Verstuur PV naar Live Feed</button>
        </section>

        <section class="bg-slate-100 p-6 rounded-2xl border-2 border-slate-300">
            <h2 class="font-black uppercase text-sm mb-6 text-slate-700 italic text-center">Deel 8: Feedback Checklist</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="feedbackChecklist">
                <label class="flex items-center gap-3 bg-white p-3 rounded-lg text-[11px] font-bold border cursor-pointer hover:bg-blue-50"><input type="checkbox" value="Dienstvoertuig Positie"> Hoe positioneer je je dienstvoertuig?</label>
                <label class="flex items-center gap-3 bg-white p-3 rounded-lg text-[11px] font-bold border cursor-pointer hover:bg-blue-50"><input type="checkbox" value="Veiligheid Ter Plaatse"> Welke veiligheidsmaatregelen neem je?</label>
                <label class="flex items-center gap-3 bg-white p-3 rounded-lg text-[11px] font-bold border cursor-pointer hover:bg-blue-50"><input type="checkbox" value="METHANE"> METHANE-methode terugmelding?</label>
                <label class="flex items-center gap-3 bg-white p-3 rounded-lg text-[11px] font-bold border cursor-pointer hover:bg-blue-50"><input type="checkbox" value="Strafbaar Feit"> Welk strafbaar feit is hier sprake?</label>
                <label class="flex items-center gap-3 bg-white p-3 rounded-lg text-[11px] font-bold border cursor-pointer hover:bg-blue-50"><input type="checkbox" value="Partners"> Welke partners inschakelen?</label>
                <label class="flex items-center gap-3 bg-white p-3 rounded-lg text-[11px] font-bold border cursor-pointer hover:bg-blue-50"><input type="checkbox" value="Opsporing"> Welke opsporingsactiviteiten?</label>
            </div>
        </section>

        <section class="mt-10">
            <div class="flex items-center gap-4 mb-6">
                <div class="h-px bg-slate-300 flex-1"></div>
                <h2 class="font-black uppercase text-[12px] text-blue-900 tracking-widest italic text-center">Live Feed van Verzonden Resultaten</h2>
                <div class="h-px bg-slate-300 flex-1"></div>
            </div>
            <div id="liveFeed" class="w-full"></div>
        </section>

    </div>
</body>
</html>
